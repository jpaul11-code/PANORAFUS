name: PANORAFUS.AI Autopilot Health

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  weekly-health-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build health metrics
        id: metrics
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' -t docs_files < <(find . -maxdepth 1 -type f \( -name "*.md" -o -name "GLOBALNETWORK" \) -print0)
          docs_count="${#docs_files[@]}"
          docs_lines="0"
          if (( docs_count > 0 )); then
            docs_lines=$(printf '%s\0' "${docs_files[@]}" | xargs -0 cat | wc -l | tr -d ' ')
          fi
          echo "docs_count=$docs_count" >> "$GITHUB_OUTPUT"
          echo "docs_lines=$docs_lines" >> "$GITHUB_OUTPUT"

      - name: Create weekly autopilot issue update
        uses: actions/github-script@v7
        env:
          DOCS_COUNT: ${{ steps.metrics.outputs.docs_count }}
          DOCS_LINES: ${{ steps.metrics.outputs.docs_lines }}
        with:
          script: |
            const title = "PANORAFUS.AI Autopilot Health Report";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const report = [
              "## PANORAFUS.AI Weekly Status",
              `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              `- Documentation files tracked: ${process.env.DOCS_COUNT}`,
              `- Documentation total lines: ${process.env.DOCS_LINES}`,
              `- Commit: ${context.sha}`,
              "",
              "_Generated automatically by PANORAFUS.AI autopilot._"
            ].join("\n");

            const query = `repo:${owner}/${repo} is:issue is:open in:title "${title}"`;
            const { data: searchResults } = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 5
            });
            const existing = searchResults.items.find(
              (item) => item.title === title && !item.pull_request
            ) || null;

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: report
              });
            }
